<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Create a secure StudyShare AI account.">
    <title>StudyShare AI | Signup</title>
    <link rel="stylesheet" href="../styles/main.css">
</head>

<body>
    <main class="auth-layout fade-in">
        <section class="auth-card surface glass">
            <a class="brand" href="index.html">
                <span class="brand-orb"></span>
                <span>StudyShare AI</span>
            </a>
            <h1>Create your account</h1>
            <p>Join the AI-powered learning community in less than a minute.</p>

            <form class="form" action="#" method="post">
                <div class="form-grid">
                    <div class="field">
                        <label for="first-name">First name</label>
                        <input class="input" id="first-name" type="text" placeholder="Aditi" required>
                    </div>
                    <div class="field">
                        <label for="last-name">Last name</label>
                        <input class="input" id="last-name" type="text" placeholder="Sharma" required>
                    </div>
                </div>
                <div class="field">
                    <label for="signup-email">Email</label>
                    <input class="input" id="signup-email" type="email" placeholder="you@campus.edu" required>
                </div>
                <div class="form-grid">
                    <div class="field">
                        <label for="signup-password">Password</label>
                        <input class="input" id="signup-password" type="password" placeholder="Create password"
                            required>
                    </div>
                    <div class="field">
                        <label for="confirm-password">Confirm password</label>
                        <input class="input" id="confirm-password" type="password" placeholder="Confirm password"
                            required>
                    </div>
                </div>
                <div class="field">
                    <label for="role">Account type</label>
                    <select id="role" required>
                        <option value="student">Student</option>
                        <option value="educator">Educator</option>
                    </select>
                </div>
                <label class="left" for="terms">
                    <input id="terms" type="checkbox" required>
                    <span>I agree to terms, privacy policy, and community rules.</span>
                </label>
                <button class="button button-primary" type="submit">Create account</button>
            </form>

            <p class="muted" style="margin-top: 0.85rem;">Already have an account? <a href="login.html">Login now</a>
            </p>
        </section>
    </main>
</body>

</html>
