<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Set a new password for StudyShare AI account.">
    <title>StudyShare AI | Reset Password</title>
    <link rel="stylesheet" href="../styles/main.css">
</head>

<body>
    <main class="auth-layout fade-in">
        <section class="auth-card surface glass">
            <a class="brand" href="index.html">
                <span class="brand-orb"></span>
                <span>StudyShare AI</span>
            </a>
            <h1>Reset password</h1>
            <p>Choose a strong password with at least 8 characters, symbols, and numbers.</p>

            <form class="form" action="#" method="post">
                <div class="field">
                    <label for="new-password">New password</label>
                    <input class="input" id="new-password" type="password" placeholder="Enter new password" required>
                </div>
                <div class="field">
                    <label for="new-password-confirm">Confirm password</label>
                    <input class="input" id="new-password-confirm" type="password" placeholder="Confirm new password"
                        required>
                </div>
                <button class="button button-primary" type="submit">Update password</button>
            </form>

            <p class="muted" style="margin-top: 0.85rem;">Return to <a href="login.html">login</a> when completed.</p>
        </section>
    </main>
</body>

</html>
