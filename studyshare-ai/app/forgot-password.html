<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Recover your StudyShare AI account with secure password reset.">
    <title>StudyShare AI | Forgot Password</title>
    <link rel="stylesheet" href="../styles/main.css">
</head>

<body>
    <main class="auth-layout fade-in">
        <section class="auth-card surface glass">
            <a class="brand" href="index.html">
                <span class="brand-orb"></span>
                <span>StudyShare AI</span>
            </a>
            <h1>Forgot password</h1>
            <p>Enter your account email to receive a password reset link and login recovery steps.</p>

            <form class="form" action="#" method="post">
                <div class="field">
                    <label for="recover-email">Email address</label>
                    <input class="input" id="recover-email" type="email" placeholder="you@campus.edu" required>
                </div>
                <button class="button button-primary" type="submit">Send reset link</button>
                <a class="button button-ghost" href="reset-password.html">Open reset form</a>
            </form>

            <p class="muted" style="margin-top: 0.85rem;">Remembered your password? <a href="login.html">Back to
                    login</a></p>
        </section>
    </main>
</body>

</html>
