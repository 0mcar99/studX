<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Contact sales page for StudyShare AI campus and enterprise plans.">
    <title>StudyShare AI | Contact Sales</title>
    <link rel="stylesheet" href="../styles/main.css">
</head>

<body>
    <main class="auth-layout fade-in">
        <section class="auth-card surface glass">
            <a class="brand" href="index.html">
                <span class="brand-orb"></span>
                <span>StudyShare AI</span>
            </a>
            <h1>Talk to sales</h1>
            <p>We help campuses and learning communities deploy StudyShare AI at scale.</p>
            <form class="form" action="#" method="post">
                <div class="field">
                    <label for="org-name">Institution or organization</label>
                    <input class="input" id="org-name" type="text" placeholder="Example University" required>
                </div>
                <div class="form-grid">
                    <div class="field">
                        <label for="contact-name">Contact name</label>
                        <input class="input" id="contact-name" type="text" placeholder="Your name" required>
                    </div>
                    <div class="field">
                        <label for="contact-email">Work email</label>
                        <input class="input" id="contact-email" type="email" placeholder="you@org.edu" required>
                    </div>
                </div>
                <div class="field">
                    <label for="requirements">Requirements</label>
                    <textarea id="requirements" rows="4"
                        placeholder="Share user count, security needs, and launch timeline"></textarea>
                </div>
                <button class="button button-primary" type="submit">Submit request</button>
            </form>
            <p class="muted" style="margin-top: 0.8rem;">Prefer self-serve? <a href="signup.html">Start with free
                    account</a>.</p>
        </section>
    </main>
</body>

</html>
